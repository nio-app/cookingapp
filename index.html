  <title>Mijn Kookapp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    html { height: 100%; height: -webkit-fill-available; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      height: 100%;
      height: -webkit-fill-available;
      overflow: hidden;
      background: #fff;
      position: fixed;
      width: 100%;
    }
    #root {
      height: 100%;
      height: -webkit-fill-available;
      width: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    ::-webkit-scrollbar { width: 0; height: 0; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── Supabase client ───────────────────────────────────────
    const supabase = window.supabase.createClient(
      "https://deyieapuipvadzgvvmdq.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRleWllYXB1aXB2YWR6Z3Z2bWRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NzQzNzAsImV4cCI6MjA5NjE1MDM3MH0.QvN1PpP1RyY-6AIQ-JIZrgPhKuYTF_NPpvZvT77Tnds"
    );

    const C = {
      accent:"#4A72B8", accentDark:"#3A5A9A", accentLight:"#EEF2FA", accentMid:"#7A9CD4",
      star:"#F59E0B", bg:"#FFFFFF", surface:"#FAFAFA", border:"#EEEEEE",
      borderMid:"#E0E0E0", text:"#202020", textMid:"#555555", textLight:"#AAAAAA", danger:"#E53935",
    };

    const CATEGORIES = ["alle","ontbijt","lunch","diner","dessert"];
    const CAT_EMOJI = {alle:"🍽️",ontbijt:"☀️",lunch:"🥙",diner:"🌙",dessert:"🍰"};
    const EMOJIS = ["🍳","🥑","🍝","🍛","🥗","🍫","🍕","🌮","🥘","🍜","🥩","🥞","🫕","🍲","🥚","🫔","🧆","🥙","🍱","🫙"];
    const fmt = v => { const n = parseFloat(v.toFixed(2)); return n % 1 === 0 ? n : n; };

    // ── Loading Spinner ───────────────────────────────────────
    function Spinner({ size=24, color=C.accent }) {
      return (
        <div style={{ width:size, height:size, border:`3px solid ${C.border}`, borderTop:`3px solid ${color}`,
          borderRadius:"50%", animation:"spin 0.8s linear infinite", flexShrink:0 }} />
      );
    }

    // ── Toast notification ────────────────────────────────────
    function Toast({ msg, type="success" }) {
      return (
        <div style={{ position:"fixed", bottom:80, left:"50%", transform:"translateX(-50%)", zIndex:999,
          background: type==="error"?"#FEECEC":type==="success"?"#E8F5E9":"#EEF2FA",
          color: type==="error"?C.danger:type==="success"?"#2E7D32":C.accent,
          padding:"10px 18px", borderRadius:10, fontSize:13, fontWeight:600,
          boxShadow:"0 4px 20px rgba(0,0,0,0.12)", animation:"fadeIn .2s ease",
          border:`1px solid ${type==="error"?"#FFCDD2":type==="success"?"#C8E6C9":C.accentMid}`,
          whiteSpace:"nowrap", maxWidth:320 }}>
          {type==="success"?"✅ ":type==="error"?"⚠️ ":"ℹ️ "}{msg}
        </div>
      );
    }

    // ── StarPicker ────────────────────────────────────────────
    function StarPicker({ value, onChange, size=26 }) {
      const [hover, setHover] = useState(0);
      return (
        <div style={{ display:"flex", gap:4 }}>
          {[1,2,3,4,5].map(s => (
            <button key={s} onClick={() => onChange(s)}
              onMouseEnter={() => setHover(s)} onMouseLeave={() => setHover(0)}
              style={{ background:"none", border:"none", cursor:"pointer", padding:2,
                fontSize:size, lineHeight:1, color:s<=(hover||Math.round(value))?C.star:"#ddd", transition:"color .1s" }}>
              ★
            </button>
          ))}
          <span style={{ fontSize:13, color:C.textMid, alignSelf:"center", marginLeft:4, fontWeight:600 }}>
            {Number(value).toFixed(1)}
          </span>
        </div>
      );
    }

    // ── StepTimer ─────────────────────────────────────────────
    function StepTimer({ seconds }) {
      const [left, setLeft] = useState(seconds);
      const [on, setOn] = useState(false);
      const [done, setDone] = useState(false);
      const r = useRef(null);
      useEffect(() => {
        if (on && left > 0) {
          r.current = setInterval(() => setLeft(t => {
            if (t <= 1) { clearInterval(r.current); setOn(false); setDone(true); return 0; }
            return t - 1;
          }), 1000);
        }
        return () => clearInterval(r.current);
      }, [on]);
      const reset = () => { clearInterval(r.current); setLeft(seconds); setOn(false); setDone(false); };
      const m = String(Math.floor(left/60)).padStart(2,"0");
      const s = String(left%60).padStart(2,"0");
      return (
        <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:8, padding:"7px 10px", borderRadius:8,
          background:done?"#FFF8E1":on?C.accentLight:"#f5f5f5",
          border:`1px solid ${done?"#F59E0B":on?C.accent:C.borderMid}` }}>
          <span style={{ fontFamily:"monospace", fontWeight:700, fontSize:15, color:done?"#E65100":on?C.accent:"#555", minWidth:46 }}>{m}:{s}</span>
          <button onClick={() => { if(done) return; setOn(x => !x); }}
            style={{ padding:"3px 10px", borderRadius:6, border:"none",
              background:done?"#FFC107":on?"#e0e0e0":C.accent,
              color:done?"#333":"#fff", fontWeight:700, fontSize:12, cursor:done?"default":"pointer" }}>
            {done ? "Klaar!" : on ? "Pauze" : "Start"}
          </button>
          {(on||done||left!==seconds) && (
            <button onClick={reset} style={{ padding:"3px 8px", borderRadius:6, border:`1px solid ${C.borderMid}`, background:"#fff", color:"#888", fontSize:12, cursor:"pointer" }}>
              &#8635;
            </button>
          )}
        </div>
      );
    }

    // ── JSON Import ───────────────────────────────────────────
    function JSONImportSection({ onImported }) {
      const [error, setError] = useState("");
      const [success, setSuccess] = useState(false);
      const fileRef = useRef(null);
      const handleFile = e => {
        const file = e.target.files[0];
        if (!file) return;
        setError(""); setSuccess(false);
        const reader = new FileReader();
        reader.onload = evt => {
          try {
            const p = JSON.parse(evt.target.result);
            const recipe = {
              name: p.name||"Onbekend recept", emoji: p.emoji||"🍳",
              category: CATEGORIES.includes(p.category) ? p.category : "diner",
              time: parseInt(p.time)||20, rating: parseFloat(p.rating)||4.5,
              portions: parseInt(p.portions)||2, source: p.source||"Eigen recept", url: p.url||"",
              ingredients: (p.ingredients||[]).map((i,idx) => ({id:idx+1,name:i.name||"",amount:parseFloat(i.amount)||1,unit:i.unit||""})),
              steps: (p.steps||[]).map((s,idx) => ({id:idx+1,text:s.text||"",timer:s.timer?parseInt(s.timer):null})),
            };
            if (!recipe.ingredients.length && !recipe.steps.length) { setError("JSON heeft geen ingredienten of stappen."); return; }
            setSuccess(true); setTimeout(() => setSuccess(false), 3000);
            onImported(recipe);
          } catch { setError("Ongeldig JSON-bestand."); }
          if (fileRef.current) fileRef.current.value = "";
        };
        reader.onerror = () => setError("Kon bestand niet lezen.");
        reader.readAsText(file);
      };
      return (
        <div style={{ marginBottom:16, padding:14, background:C.accentLight, borderRadius:12, border:`1px solid ${C.accentMid}` }}>
          <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:6 }}>
            <span>📂</span>
            <span style={{ fontWeight:700, fontSize:13, color:C.accent }}>Importeer via JSON</span>
          </div>
          <p style={{ fontSize:12, color:C.textMid, margin:"0 0 10px", lineHeight:1.6 }}>
            Upload een <code style={{ background:"#fff", padding:"1px 5px", borderRadius:4, fontSize:11, border:`1px solid ${C.borderMid}` }}>.json</code> bestand.
          </p>
          <input ref={fileRef} type="file" accept=".json,application/json" onChange={handleFile} style={{ display:"none" }} id="json-upload" />
          <label htmlFor="json-upload" style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:8, padding:"10px 16px", background:C.accent, color:"#fff", borderRadius:8, fontWeight:700, fontSize:13, cursor:"pointer" }}>
            📁 Selecteer JSON-bestand
          </label>
          {success && <div style={{ marginTop:8, fontSize:12, color:"#2E7D32", fontWeight:600, background:"#E8F5E9", padding:"6px 10px", borderRadius:6 }}>✅ Geimporteerd!</div>}
          {error && <div style={{ marginTop:8, fontSize:12, color:C.danger, background:"#FEECEC", padding:"6px 10px", borderRadius:6 }}>⚠️ {error}</div>}
        </div>
      );
    }

    // ── Recipe Form ───────────────────────────────────────────
    function RecipeForm({ initial, onClose, onSave, title, saving }) {
      const isEdit = !!initial;
      const uid = () => Date.now() + Math.random();
      const [name, setName] = useState(initial?.name||"");
      const [emoji, setEmoji] = useState(initial?.emoji||"🍳");
      const [category, setCategory] = useState(initial?.category||"diner");
      const [time, setTime] = useState(initial?.time?String(initial.time):"");
      const [rating, setRating] = useState(initial?.rating||4.5);
      const [portions, setPortions] = useState(initial?.portions?String(initial.portions):"2");
      const [source, setSource] = useState(initial?.source||"");
      const [url, setUrl] = useState(initial?.url||"");
      const [ingredients, setIngredients] = useState(
        initial?.ingredients?.map(i=>({id:uid(),name:i.name,amount:String(i.amount),unit:i.unit}))||[{id:uid(),name:"",amount:"",unit:""}]
      );
      const [steps, setSteps] = useState(
        initial?.steps?.map(s=>({id:uid(),text:s.text,timer:s.timer?String(Math.round(s.timer/60)):""}))||[{id:uid(),text:"",timer:""}]
      );
      const [emojiOpen, setEmojiOpen] = useState(false);
      const [page, setPage] = useState(0);

      const prefill = recipe => {
        setName(recipe.name||""); setEmoji(recipe.emoji||"🍳"); setCategory(recipe.category||"diner");
        setTime(String(recipe.time||"")); setRating(recipe.rating||4.5); setPortions(String(recipe.portions||2));
        setSource(recipe.source||""); setUrl(recipe.url||"");
        setIngredients(recipe.ingredients.map(i=>({id:uid(),name:i.name,amount:String(i.amount),unit:i.unit})));
        setSteps(recipe.steps.map(s=>({id:uid(),text:s.text,timer:s.timer?String(Math.round(s.timer/60)):""})));
        setPage(1);
      };

      const addIng = () => setIngredients(p=>[...p,{id:uid(),name:"",amount:"",unit:""}]);
      const removeIng = id => setIngredients(p=>p.filter(x=>x.id!==id));
      const setIng = (id,f,v) => setIngredients(p=>p.map(x=>x.id===id?{...x,[f]:v}:x));
      const addStep = () => setSteps(p=>[...p,{id:uid(),text:"",timer:""}]);
      const removeStep = id => setSteps(p=>p.filter(x=>x.id!==id));
      const setStep = (id,f,v) => setSteps(p=>p.map(x=>x.id===id?{...x,[f]:v}:x));
      const valid = name.trim() && ingredients.some(i=>i.name.trim()) && steps.some(s=>s.text.trim());

      const save = () => {
        if (!valid || saving) return;
        onSave({
          ...(initial||{}),
          name:name.trim(), emoji, category,
          time:parseInt(time)||15, rating, portions:parseInt(portions)||2,
          source:source||"Eigen recept", url:url||"",
          ingredients:ingredients.filter(i=>i.name.trim()).map((i,idx)=>({id:idx+1,name:i.name,amount:parseFloat(i.amount)||1,unit:i.unit})),
          steps:steps.filter(s=>s.text.trim()).map((s,idx)=>({id:idx+1,text:s.text,timer:s.timer?parseInt(s.timer)*60:null})),
        });
      };

      const inp = {width:"100%",padding:"10px 12px",border:`1px solid ${C.borderMid}`,borderRadius:8,fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box",background:"#fafafa"};
      const lbl = {fontSize:12,fontWeight:600,color:C.textMid,display:"block",marginBottom:4};

      return (
        <div style={{position:"fixed",inset:0,zIndex:100,display:"flex",flexDirection:"column",background:"#fff",overflow:"hidden"}}>
          <div style={{padding:"max(16px, env(safe-area-inset-top, 16px)) 16px 0",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#888",padding:4}}>✕</button>
              <span style={{fontWeight:700,fontSize:16,color:C.text}}>{title}</span>
              <button onClick={save} disabled={!valid||saving} style={{background:valid&&!saving?C.accent:C.borderMid,color:"#fff",border:"none",borderRadius:8,padding:"7px 16px",fontWeight:700,fontSize:13,cursor:valid&&!saving?"pointer":"not-allowed",fontFamily:"inherit",display:"flex",alignItems:"center",gap:6}}>
                {saving ? <Spinner size={14} color="#fff"/> : null}
                {isEdit?"Opslaan":"Toevoegen"}
              </button>
            </div>
            <div style={{display:"flex",flexShrink:0}}>
              {["Basis","Ingredienten","Stappen"].map((t,i)=>(
                <button key={t} onClick={()=>setPage(i)} style={{flex:1,background:"none",border:"none",borderBottom:`2px solid ${page===i?C.accent:"transparent"}`,padding:"8px 0",fontWeight:page===i?700:500,fontSize:13,color:page===i?C.accent:"#888",cursor:"pointer",fontFamily:"inherit"}}>{t}</button>
              ))}
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",overflowX:"hidden",padding:16,WebkitOverflowScrolling:"touch"}}>
            {page===0 && (
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                {!isEdit && <JSONImportSection onImported={prefill} />}
                <div>
                  <label style={lbl}>Emoji</label>
                  <button onClick={()=>setEmojiOpen(o=>!o)} style={{fontSize:28,background:"#f5f5f5",border:`1px solid ${C.borderMid}`,borderRadius:12,padding:"8px 16px",cursor:"pointer"}}>{emoji}</button>
                  {emojiOpen && (
                    <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:8,padding:10,background:"#f9f9f9",borderRadius:12,border:`1px solid ${C.border}`}}>
                      {EMOJIS.map(e=><button key={e} onClick={()=>{setEmoji(e);setEmojiOpen(false);}} style={{fontSize:24,background:emoji===e?C.accentLight:"transparent",border:emoji===e?`1px solid ${C.accent}`:"1px solid transparent",borderRadius:8,padding:4,cursor:"pointer"}}>{e}</button>)}
                    </div>
                  )}
                </div>
                <div><label style={lbl}>Naam *</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="Naam van het recept" style={inp}/></div>
                <div><label style={lbl}>Beoordeling</label><StarPicker value={rating} onChange={setRating} size={28}/></div>
                <div>
                  <label style={lbl}>Categorie</label>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {CATEGORIES.slice(1).map(c=>(
                      <button key={c} onClick={()=>setCategory(c)} style={{padding:"6px 14px",borderRadius:20,border:`1px solid ${category===c?C.accent:C.borderMid}`,background:category===c?C.accent:"#fff",color:category===c?"#fff":C.textMid,fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
                        {CAT_EMOJI[c]} {c.charAt(0).toUpperCase()+c.slice(1)}
                      </button>
                    ))}
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <div><label style={lbl}>Bereidingstijd (min)</label><input type="number" value={time} onChange={e=>setTime(e.target.value)} placeholder="20" style={inp}/></div>
                  <div><label style={lbl}>Porties</label><input type="number" value={portions} onChange={e=>setPortions(e.target.value)} placeholder="2" style={inp}/></div>
                </div>
                <div><label style={lbl}>Bron</label><input value={source} onChange={e=>setSource(e.target.value)} placeholder="bijv. Jamie Oliver" style={inp}/></div>
                <div><label style={lbl}>Website URL</label><input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://..." style={inp}/></div>
              </div>
            )}
            {page===1 && (
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <p style={{fontSize:13,color:"#888",margin:"0 0 4px"}}>Voeg ingredienten toe.</p>
                {ingredients.map((ing,i)=>(
                  <div key={ing.id} style={{background:"#fafafa",borderRadius:10,padding:10,border:`1px solid ${C.border}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                      <span style={{fontSize:12,fontWeight:700,color:"#aaa"}}>#{i+1}</span>
                      {ingredients.length>1&&<button onClick={()=>removeIng(ing.id)} style={{background:"none",border:"none",color:"#ccc",fontSize:16,cursor:"pointer",padding:0}}>✕</button>}
                    </div>
                    <input value={ing.name} onChange={e=>setIng(ing.id,"name",e.target.value)} placeholder="Naam ingredient *" style={{...inp,marginBottom:6}}/>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                      <input type="number" value={ing.amount} onChange={e=>setIng(ing.id,"amount",e.target.value)} placeholder="Hoeveelheid" style={inp}/>
                      <input value={ing.unit} onChange={e=>setIng(ing.id,"unit",e.target.value)} placeholder="Eenheid (g, ml...)" style={inp}/>
                    </div>
                  </div>
                ))}
                <button onClick={addIng} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:`1px dashed ${C.accent}`,borderRadius:10,padding:"10px 14px",color:C.accent,fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>+ Ingredient toevoegen</button>
              </div>
            )}
            {page===2 && (
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <p style={{fontSize:13,color:"#888",margin:"0 0 4px"}}>Voeg stappen toe.</p>
                {steps.map((step,i)=>(
                  <div key={step.id} style={{background:"#fafafa",borderRadius:10,padding:10,border:`1px solid ${C.border}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                      <div style={{width:22,height:22,borderRadius:6,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:11}}>{i+1}</div>
                      {steps.length>1&&<button onClick={()=>removeStep(step.id)} style={{background:"none",border:"none",color:"#ccc",fontSize:16,cursor:"pointer",padding:0}}>✕</button>}
                    </div>
                    <textarea value={step.text} onChange={e=>setStep(step.id,"text",e.target.value)} placeholder="Beschrijf deze stap *" rows={2} style={{...inp,resize:"vertical",marginBottom:6}}/>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:12,color:"#888"}}>Timer (min):</span>
                      <input type="number" value={step.timer} onChange={e=>setStep(step.id,"timer",e.target.value)} placeholder="-" style={{width:60,padding:"6px 8px",border:`1px solid ${C.borderMid}`,borderRadius:6,fontSize:13,fontFamily:"inherit",textAlign:"center"}}/>
                    </div>
                  </div>
                ))}
                <button onClick={addStep} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:`1px dashed ${C.accent}`,borderRadius:10,padding:"10px 14px",color:C.accent,fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>+ Stap toevoegen</button>
              </div>
            )}
            <div style={{height:40}}/>
          </div>
        </div>
      );
    }

    // ── Delete Sheet ──────────────────────────────────────────
    function DeleteSheet({ recipe, onCancel, onConfirm, deleting }) {
      return (
        <div style={{position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"flex-end"}}>
          <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"24px 20px 40px",width:"100%",maxWidth:390,margin:"0 auto"}}>
            <div style={{fontSize:32,textAlign:"center",marginBottom:8}}>{recipe.emoji}</div>
            <h3 style={{fontWeight:700,fontSize:17,color:C.text,textAlign:"center",margin:"0 0 6px"}}>Recept verwijderen?</h3>
            <p style={{fontSize:14,color:"#888",textAlign:"center",margin:"0 0 20px"}}>"{recipe.name}" wordt permanent verwijderd.</p>
            <button onClick={onConfirm} disabled={deleting} style={{width:"100%",padding:"14px",background:C.danger,color:"#fff",border:"none",borderRadius:10,fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"inherit",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              {deleting && <Spinner size={16} color="#fff"/>} Verwijderen
            </button>
            <button onClick={onCancel} disabled={deleting} style={{width:"100%",padding:"14px",background:"#f5f5f5",color:"#333",border:"none",borderRadius:10,fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"inherit"}}>Annuleren</button>
          </div>
        </div>
      );
    }

    // ── Recipe Detail ─────────────────────────────────────────
    function RecipeDetail({ recipe, onBack, onDelete, onEdit, onRate, saving }) {
      const [portions, setPortions] = useState(recipe.portions);
      const [checked, setChecked] = useState({});
      const [tab, setTab] = useState("ing");
      const [confirmDelete, setConfirmDelete] = useState(false);
      const [showRating, setShowRating] = useState(false);
      const [deleting, setDeleting] = useState(false);
      const ratio = portions / recipe.portions;
      const toggle = id => setChecked(c=>({...c,[id]:!c[id]}));

      const handleDelete = async () => {
        setDeleting(true);
        await onDelete(recipe.id);
        setDeleting(false);
      };

      return (
        <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#fff",overflow:"hidden"}}>
          <div style={{padding:"max(16px, env(safe-area-inset-top, 16px)) 16px 0",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <button onClick={onBack} style={{background:"none",border:"none",color:C.accent,fontWeight:700,fontSize:14,cursor:"pointer",padding:0,fontFamily:"inherit"}}>&#8249; Terug</button>
              <div style={{display:"flex",gap:8}}>
                <button onClick={onEdit} style={{background:C.accentLight,border:"none",borderRadius:8,padding:"6px 12px",color:C.accent,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>✏️ Bewerken</button>
                <button onClick={()=>setConfirmDelete(true)} style={{background:"#fff0f0",border:"none",borderRadius:8,padding:"6px 10px",color:C.danger,fontSize:14,cursor:"pointer"}}>🗑️</button>
              </div>
            </div>
          </div>
          <div style={{padding:"12px 16px 16px",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
            <div style={{fontSize:44,marginBottom:8}}>{recipe.emoji}</div>
            <h2 style={{fontWeight:700,fontSize:20,color:C.text,margin:"0 0 6px"}}>{recipe.name}</h2>
            <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:8}}>
              <span style={{fontSize:13,color:"#888"}}>⏰ {recipe.time} min</span>
              <span style={{fontSize:12,color:"#888",background:"#f5f5f5",borderRadius:6,padding:"2px 8px",textTransform:"capitalize"}}>{recipe.category}</span>
              {recipe.url
                ? <a href={recipe.url} target="_blank" rel="noopener noreferrer" style={{fontSize:12,color:C.accent,textDecoration:"none",fontWeight:600}}>🔗 {recipe.source}</a>
                : <span style={{fontSize:12,color:"#aaa"}}>{recipe.source}</span>
              }
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{display:"flex",gap:2}}>
                {[1,2,3,4,5].map(s=><span key={s} style={{fontSize:18,color:s<=Math.round(recipe.rating)?C.star:"#ddd"}}>★</span>)}
              </div>
              <span style={{fontSize:13,fontWeight:700,color:C.textMid}}>{Number(recipe.rating).toFixed(1)}</span>
              <button onClick={()=>setShowRating(o=>!o)} style={{marginLeft:4,background:C.accentLight,border:"none",borderRadius:6,padding:"4px 10px",color:C.accent,fontWeight:600,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>
                {showRating?"Sluiten":"Beoordelen"}
              </button>
            </div>
            {showRating && (
              <div style={{marginTop:10,padding:"10px 12px",background:C.accentLight,borderRadius:10,border:`1px solid ${C.accentMid}`}}>
                <p style={{fontSize:12,color:C.textMid,margin:"0 0 8px",fontWeight:600}}>Geef een beoordeling:</p>
                <StarPicker value={recipe.rating} onChange={v=>{onRate(recipe.id,v);setShowRating(false);}} size={30}/>
              </div>
            )}
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 16px",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
            <span style={{fontWeight:600,fontSize:14,color:"#333"}}>Porties</span>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <button onClick={()=>setPortions(p=>Math.max(1,p-1))} style={{width:30,height:30,borderRadius:8,background:"#f5f5f5",border:`1px solid ${C.borderMid}`,color:"#333",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
              <span style={{fontWeight:700,fontSize:16,color:C.accent,minWidth:16,textAlign:"center"}}>{portions}</span>
              <button onClick={()=>setPortions(p=>p+1)} style={{width:30,height:30,borderRadius:8,background:C.accent,border:"none",color:"#fff",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
            </div>
          </div>
          <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
            {[["ing","Ingredienten"],["steps","Stappen"]].map(([id,label])=>(
              <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"10px 0",background:"none",border:"none",borderBottom:`2px solid ${tab===id?C.accent:"transparent"}`,fontWeight:tab===id?700:500,fontSize:13,color:tab===id?C.accent:"#888",cursor:"pointer",fontFamily:"inherit"}}>{label}</button>
            ))}
          </div>
          <div style={{flex:1,overflowY:"auto",overflowX:"hidden",padding:"12px 16px",WebkitOverflowScrolling:"touch"}}>
            {tab==="ing" ? (
              recipe.ingredients.map(ing=>(
                <div key={ing.id} onClick={()=>toggle(ing.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 0",borderBottom:"1px solid #f5f5f5",cursor:"pointer"}}>
                  <div style={{width:20,height:20,borderRadius:5,border:`1.5px solid ${checked[ing.id]?C.accent:C.borderMid}`,background:checked[ing.id]?C.accent:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
                    {checked[ing.id]&&<span style={{color:"#fff",fontSize:11,fontWeight:700}}>✓</span>}
                  </div>
                  <span style={{flex:1,fontSize:14,color:checked[ing.id]?"#bbb":"#333",textDecoration:checked[ing.id]?"line-through":"none",transition:"all .15s"}}>{ing.name}</span>
                  <span style={{fontSize:13,fontWeight:700,color:C.accent}}>{fmt(ing.amount*ratio)}{ing.unit?" "+ing.unit:""}</span>
                </div>
              ))
            ) : (
              recipe.steps.map((step,i)=>(
                <div key={step.id} style={{marginBottom:16,paddingBottom:16,borderBottom:"1px solid #f5f5f5"}}>
                  <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                    <div style={{width:24,height:24,borderRadius:6,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:12,flexShrink:0}}>{i+1}</div>
                    <p style={{margin:0,fontSize:14,color:"#333",lineHeight:"1.6",flex:1}}>{step.text}</p>
                  </div>
                  {step.timer&&<StepTimer seconds={step.timer}/>}
                </div>
              ))
            )}
            <div style={{height:20}}/>
          </div>
          {confirmDelete&&<DeleteSheet recipe={recipe} deleting={deleting} onCancel={()=>setConfirmDelete(false)} onConfirm={handleDelete}/>}
        </div>
      );
    }

    // ── Free Timer ────────────────────────────────────────────
    function FreeTimer() {
      const [mins, setMins] = useState(5);
      const [secs, setSecs] = useState(0);
      const [left, setLeft] = useState(null);
      const [on, setOn] = useState(false);
      const [done, setDone] = useState(false);
      const r = useRef(null);
      const total = mins*60+secs;
      const cur = left??total;
      const pct = total>0?(cur/total)*100:0;
      useEffect(()=>{
        if(on&&cur>0){r.current=setInterval(()=>setLeft(t=>{if(t<=1){clearInterval(r.current);setOn(false);setDone(true);return 0;}return t-1;}),1000);}
        return ()=>clearInterval(r.current);
      },[on]);
      const reset=()=>{clearInterval(r.current);setLeft(null);setOn(false);setDone(false);};
      const m=String(Math.floor(cur/60)).padStart(2,"0");
      const s=String(cur%60).padStart(2,"0");
      return (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:24,padding:"32px 0"}}>
          <div style={{position:"relative",width:180,height:180}}>
            <svg width={180} height={180} style={{transform:"rotate(-90deg)"}}>
              <circle cx={90} cy={90} r={78} fill="none" stroke="#f0f0f0" strokeWidth={10}/>
              <circle cx={90} cy={90} r={78} fill="none" stroke={done?C.star:C.accent} strokeWidth={10}
                strokeDasharray={`${2*Math.PI*78}`} strokeDashoffset={`${2*Math.PI*78*(1-pct/100)}`}
                strokeLinecap="round" style={{transition:"stroke-dashoffset 0.5s"}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontFamily:"monospace",fontSize:34,fontWeight:700,color:done?C.star:C.text}}>{m}:{s}</span>
              {done&&<span style={{fontSize:12,color:C.star,fontWeight:700}}>KLAAR! 🎉</span>}
            </div>
          </div>
          {!on&&left===null&&(
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              {[["Min",mins,setMins,1,99],["Sec",secs,setSecs,15,45]].map(([label,val,setFn,step,max])=>(
                <div key={label} style={{textAlign:"center"}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#aaa",marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>{label}</div>
                  <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"center"}}>
                    <button onClick={()=>setFn(v=>Math.min(max,v+step))} style={{width:36,height:28,borderRadius:6,background:"#f5f5f5",border:`1px solid ${C.borderMid}`,fontSize:14,cursor:"pointer",color:"#333"}}>+</button>
                    <span style={{fontFamily:"monospace",fontSize:22,fontWeight:700,color:C.text}}>{String(val).padStart(2,"0")}</span>
                    <button onClick={()=>setFn(v=>Math.max(0,v-step))} style={{width:36,height:28,borderRadius:6,background:"#f5f5f5",border:`1px solid ${C.borderMid}`,fontSize:14,cursor:"pointer",color:"#333"}}>−</button>
                  </div>
                </div>
              ))}
            </div>
          )}
          <div style={{display:"flex",gap:10}}>
            {!on&&!done&&<button onClick={()=>{setLeft(total);setDone(false);setOn(true);}} style={{padding:"12px 32px",borderRadius:10,background:C.accent,color:"#fff",border:"none",fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"inherit"}}>&#9654; Start</button>}
            {on&&<button onClick={()=>{clearInterval(r.current);setOn(false);}} style={{padding:"12px 32px",borderRadius:10,background:"#f5f5f5",color:"#333",border:"none",fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"inherit"}}>Pauze</button>}
            {(on||done||left!==null)&&<button onClick={reset} style={{padding:"12px 20px",borderRadius:10,background:"transparent",color:"#aaa",border:`1px solid ${C.borderMid}`,fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"inherit"}}>&#8635; Reset</button>}
          </div>
        </div>
      );
    }

    // ── Bottom Nav ────────────────────────────────────────────
    function BottomNav({ tab, setTab }) {
      const items = [
        {id:"recepten",label:"Recepten",icon:"🍽️"},
        {id:"favorieten",label:"Favorieten",icon:"❤️"},
        {id:"timer",label:"Timer",icon:"⏱️"},
      ];
      return (
        <div style={{background:"#fff",borderTop:`1px solid ${C.border}`,display:"flex",flexShrink:0,paddingBottom:"env(safe-area-inset-bottom, 20px)"}}>
          {items.map(({id,icon,label})=>(
            <button key={id} onClick={()=>setTab(id)} style={{flex:1,background:"none",border:"none",padding:"10px 0 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer",color:tab===id?C.accent:"#bbb",fontFamily:"inherit"}}>
              <span style={{fontSize:22,width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,opacity:tab===id?1:0.4}}>{icon}</span>
              <span style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",lineHeight:1}}>{label}</span>
              <div style={{width:16,height:2,borderRadius:1,background:C.accent,opacity:tab===id?1:0,marginTop:1}}/>
            </button>
          ))}
        </div>
      );
    }

    // ── Main App ──────────────────────────────────────────────
    function App() {
      const [recipes, setRecipes] = useState([]);
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [tab, setTab] = useState("recepten");
      const [search, setSearch] = useState("");
      const [cat, setCat] = useState("alle");
      const [selected, setSelected] = useState(null);
      const [editing, setEditing] = useState(null);
      const [showAdd, setShowAdd] = useState(false);
      const [toast, setToast] = useState(null);

      const showToast = (msg, type="success") => {
        setToast({msg,type});
        setTimeout(()=>setToast(null), 3000);
      };

      // ── Load from Supabase ──
      const loadRecipes = useCallback(async () => {
        setLoading(true);
        const { data, error } = await supabase
          .from("recepten")
          .select("*")
          .order("created_at", { ascending: false });
        if (error) { showToast("Kon recepten niet laden: "+error.message, "error"); }
        else { setRecipes(data || []); }
        setLoading(false);
      }, []);

      useEffect(() => { loadRecipes(); }, []);

      // ── Add ──
      const addRecipe = async recipe => {
        setSaving(true);
        const { data, error } = await supabase.from("recepten").insert([{
          name: recipe.name, emoji: recipe.emoji, category: recipe.category,
          time: recipe.time, rating: recipe.rating, portions: recipe.portions,
          source: recipe.source, url: recipe.url,
          ingredients: recipe.ingredients, steps: recipe.steps,
          is_favorite: false,
        }]).select().single();
        if (error) { showToast("Opslaan mislukt: "+error.message, "error"); }
        else { setRecipes(p=>[data,...p]); setShowAdd(false); showToast("Recept toegevoegd!"); }
        setSaving(false);
      };

      // ── Edit ──
      const editRecipe = async recipe => {
        setSaving(true);
        const { data, error } = await supabase.from("recepten").update({
          name: recipe.name, emoji: recipe.emoji, category: recipe.category,
          time: recipe.time, rating: recipe.rating, portions: recipe.portions,
          source: recipe.source, url: recipe.url,
          ingredients: recipe.ingredients, steps: recipe.steps,
        }).eq("id", recipe.id).select().single();
        if (error) { showToast("Bewerken mislukt: "+error.message, "error"); }
        else {
          setRecipes(p=>p.map(x=>x.id===recipe.id?data:x));
          setSelected(data); setEditing(null);
          showToast("Recept bijgewerkt!");
        }
        setSaving(false);
      };

      // ── Delete ──
      const deleteRecipe = async id => {
        const { error } = await supabase.from("recepten").delete().eq("id", id);
        if (error) { showToast("Verwijderen mislukt: "+error.message, "error"); }
        else { setRecipes(p=>p.filter(x=>x.id!==id)); setSelected(null); showToast("Recept verwijderd!", "info"); }
      };

      // ── Rate ──
      const rateRecipe = async (id, rating) => {
        const { data, error } = await supabase.from("recepten").update({ rating }).eq("id", id).select().single();
        if (error) { showToast("Beoordeling opslaan mislukt", "error"); }
        else {
          setRecipes(p=>p.map(x=>x.id===id?data:x));
          setSelected(s=>s?.id===id?data:s);
          showToast("Beoordeling opgeslagen!");
        }
      };

      // ── Favorite ──
      const toggleFav = async (id, e) => {
        e && e.stopPropagation();
        const recipe = recipes.find(r=>r.id===id);
        if (!recipe) return;
        const newFav = !recipe.is_favorite;
        const { data, error } = await supabase.from("recepten").update({ is_favorite: newFav }).eq("id", id).select().single();
        if (!error) setRecipes(p=>p.map(x=>x.id===id?data:x));
      };

      const pool = tab==="favorieten"
        ? recipes.filter(r=>r.is_favorite)
        : recipes.filter(r=>(cat==="alle"||r.category===cat)&&r.name.toLowerCase().includes(search.toLowerCase()));

      if (editing) return (
        <div style={{maxWidth:390,margin:"0 auto",height:"100%",display:"flex",flexDirection:"column",background:"#fff",overflow:"hidden"}}>
          <RecipeForm initial={editing} title="Recept bewerken" onClose={()=>setEditing(null)} onSave={editRecipe} saving={saving}/>
        </div>
      );

      if (selected) return (
        <div style={{maxWidth:390,margin:"0 auto",height:"100%",display:"flex",flexDirection:"column",background:"#fff",overflow:"hidden"}}>
          <RecipeDetail recipe={selected} onBack={()=>setSelected(null)} onDelete={deleteRecipe} onEdit={()=>setEditing(selected)} onRate={rateRecipe} saving={saving}/>
          {toast && <Toast msg={toast.msg} type={toast.type}/>}
        </div>
      );

      return (
        <div style={{maxWidth:390,margin:"0 auto",height:"100%",display:"flex",flexDirection:"column",background:"#fff",overflow:"hidden"}}>
          <div style={{padding:"max(20px, env(safe-area-inset-top, 20px)) 16px 0"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div>
                <h1 style={{fontWeight:800,fontSize:22,color:C.text,margin:0}}>
                  {tab==="recepten"?"Mijn Recepten":tab==="favorieten"?"Favorieten ❤️":"Kooktimer"}
                </h1>
                {tab==="recepten"&&<p style={{fontSize:13,color:C.textLight,margin:"2px 0 0"}}>{pool.length} recept{pool.length!==1?"en":""}</p>}
              </div>
              {tab==="recepten"&&(
                <button onClick={()=>setShowAdd(true)} style={{width:36,height:36,borderRadius:10,background:C.accent,border:"none",color:"#fff",fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button>
              )}
            </div>
            {tab==="recepten"&&(
              <div style={{position:"relative",marginBottom:12}}>
                <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:15,color:"#bbb"}}>🔍</span>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Zoek recepten..." style={{width:"100%",padding:"10px 12px 10px 36px",border:`1px solid ${C.border}`,borderRadius:10,fontSize:14,fontFamily:"inherit",outline:"none",background:"#fafafa"}}/>
                {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#bbb",fontSize:16,cursor:"pointer",padding:0}}>✕</button>}
              </div>
            )}
            {tab==="recepten"&&(
              <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:12}}>
                {CATEGORIES.map(c=>(
                  <button key={c} onClick={()=>setCat(c)} style={{flexShrink:0,padding:"5px 12px",borderRadius:20,border:`1px solid ${cat===c?C.accent:C.border}`,background:cat===c?C.accent:"#fff",color:cat===c?"#fff":"#666",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
                    {CAT_EMOJI[c]} {c.charAt(0).toUpperCase()+c.slice(1)}
                  </button>
                ))}
              </div>
            )}
          </div>

          <div style={{flex:1,overflowY:"auto",overflowX:"hidden",WebkitOverflowScrolling:"touch"}}>
            {tab==="timer" ? <FreeTimer/> : loading ? (
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"80px 24px",gap:16}}>
                <Spinner size={36}/>
                <span style={{fontSize:14,color:C.textLight}}>Recepten laden...</span>
              </div>
            ) : pool.length===0 ? (
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 24px",color:"#ccc"}}>
                <div style={{fontSize:48,marginBottom:12}}>🍽️</div>
                <div style={{fontWeight:700,fontSize:16,color:"#bbb",marginBottom:6}}>
                  {tab==="favorieten"?"Geen favorieten":"Geen recepten gevonden"}
                </div>
                <div style={{fontSize:13}}>
                  {tab==="favorieten"?"Tik het hartje op een recept":recipes.length===0?"Voeg je eerste recept toe met de + knop":"Probeer een andere zoekopdracht"}
                </div>
              </div>
            ) : (
              <div>
                {pool.map((r,i)=>(
                  <div key={r.id} onClick={()=>setSelected(r)}
                    style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderBottom:"1px solid #f5f5f5",cursor:"pointer",background:"#fff"}}
                    onMouseEnter={e=>e.currentTarget.style.background="#f7f9fd"}
                    onMouseLeave={e=>e.currentTarget.style.background="#fff"}
                  >
                    <div style={{width:44,height:44,borderRadius:12,background:`hsl(${210+(i*23)%40},60%,93%)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>
                      {r.emoji}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:15,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.name}</div>
                      <div style={{display:"flex",gap:8,alignItems:"center",marginTop:2}}>
                        <span style={{fontSize:12,color:"#aaa"}}>⏰ {r.time} min</span>
                        <span style={{fontSize:12,color:C.star,fontWeight:600}}>★ {Number(r.rating).toFixed(1)}</span>
                        <span style={{fontSize:11,color:"#bbb",background:"#f5f5f5",borderRadius:4,padding:"1px 6px",textTransform:"capitalize"}}>{r.category}</span>
                      </div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <button onClick={e=>toggleFav(r.id,e)} style={{background:"none",border:"none",fontSize:17,cursor:"pointer",padding:4,color:r.is_favorite?C.accent:"#ddd"}}>
                        {r.is_favorite?"♥":"♡"}
                      </button>
                      <span style={{color:"#ddd",fontSize:16}}>›</span>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          <BottomNav tab={tab} setTab={setTab}/>
          {showAdd&&<RecipeForm title="Nieuw recept" onClose={()=>setShowAdd(false)} onSave={addRecipe} saving={saving}/>}
          {toast&&<Toast msg={toast.msg} type={toast.type}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
